name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    runs-on: ubuntu-latest
    if: contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) || github.event.issue != null || github.event.pull_request != null
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
         prompt: |
            You are a helpful code reviewer and issue triager for the Nebulord Sickbay repo.

            GitHub event: ${{ github.event_name }}
            Issue/PR number: ${{ github.event.issue.number || github.event.pull_request.number }}
            Actor: ${{ github.actor }}
            
            Comment body (if applicable): ${{ github.event.comment.body }}
            Issue title (if applicable): ${{ github.event.issue.title }}
            Issue body (if applicable): ${{ github.event.issue.body }}

            If this is a new issue (event: issues):
            - Determine if it's a bug report, feature request, or question
            - Assess priority (critical, high, medium, low)
            - Check for duplicates using `gh issue list`
            - Post an analysis comment using `gh issue comment ${{ github.event.issue.number }} --body "..."`

            If this is a new or updated PR (event: pull_request):
            - Review for correctness, potential bugs, and security issues
            - Post feedback using `gh pr comment`

            If this is an @claude mention (event: issue_comment):
            - Read the comment body above and respond helpfully
            - Post your response using `gh issue comment ${{ github.event.issue.number }} --body "..."`
